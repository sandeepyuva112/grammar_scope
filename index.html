<!DOCTYPE html>
<html>
<head>
<title>GrammarScope - Smart Grammar Analyzer</title>

<style>
body{
font-family:Arial;
padding:20px;
margin:0;
overflow:hidden;
}

/* BACKGROUND */
body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:url('https://images.unsplash.com/photo-1524995997946-a1c2e315a42f') no-repeat center;
background-size:cover;
z-index:-2;
animation: zoomBg 20s infinite alternate;
}

@keyframes zoomBg{
0%{transform:scale(1);}
100%{transform:scale(1.2);}
}

body::after{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
z-index:-1;
}

/* PARTICLES */
.particle{
position:absolute;
width:6px;
height:6px;
background:white;
border-radius:50%;
opacity:0.7;
animation: float 10s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh);opacity:0;}
50%{opacity:1;}
100%{transform:translateY(-10vh);opacity:0;}
}

.container{
background:#fff;
padding:25px;
border-radius:15px;
max-width:700px;
margin:auto;
text-align:center;
box-shadow:0 8px 20px rgba(0,0,0,0.3);
position:relative;
z-index:1;
top:50px;
}

input{
width:80%;
padding:12px;
border-radius:10px;
border:1px solid #ccc;
margin-top:20px;
}

button{
padding:12px 25px;
margin:15px;
border:none;
border-radius:10px;
background:#2196f3;
color:white;
cursor:pointer;
font-weight:bold;
}

.analysis{
margin-top:20px;
padding:15px;
background:#fce4ec;
border-radius:10px;
text-align:left;
}
</style>
</head>

<body>

<script>
// particles
for(let i=0;i<40;i++){
let p = document.createElement("div");
p.className="particle";
p.style.left = Math.random()*100 + "vw";
p.style.animationDuration = (5 + Math.random()*5) + "s";
p.style.animationDelay = Math.random()*5 + "s";
document.body.appendChild(p);
}
</script>

<div class="container">

<h2>📚 GrammarScope</h2>
<p>Enter your sentence and analyze grammar</p>

<input type="text" id="userInput" placeholder="Enter your sentence here...">

<br>

<button onclick="analyze()">Analyze</button>
<button onclick="clearBox()">Clear</button>

<div id="result" class="analysis"></div>

</div>

<script>

function analyze(){

let sentence = document.getElementById("userInput").value.trim();

if(sentence.length === 0){
document.getElementById("result").innerHTML="⚠ Please enter a sentence";
return;
}

let words = sentence.toLowerCase().match(/\b\w+\b/g);

let singular = [];
let plural = [];
let verbs = [];

// ignore words
let ignoreWords = ["i","am","is","are","was","were","be","been","being","a","an","the"];

// pronouns
let pronouns = ["i","we","you","he","she","it","they","me","us","him","her","them"];

// adjectives
let adjectives = ["good","bad","happy","sad","big","small","fast","slow","beautiful"];

// irregular plurals
let irregularPlural = ["men","women","children","people","feet","teeth"];

// verbs list
let verbsList = [
"is","am","are","was","were","be","been","being",
"have","has","had","do","does","did",
"go","goes","went","gone",
"eat","eats","ate","eating",
"run","runs","ran","running",
"play","plays","played","playing",
"read","reads","reading",
"write","writes","writing",
"see","sees","saw","seen",
"make","makes","made",
"take","takes","took","taken"
];

words.forEach(w=>{

    // skip pronouns
    if(pronouns.includes(w)){
        return;
    }

    // verbs
    if(verbsList.includes(w)){
        verbs.push(w);
        return;
    }

    // ignore + adjectives
    if(ignoreWords.includes(w) || adjectives.includes(w)){
        return;
    }

    // plural
    if(irregularPlural.includes(w)){
        plural.push(w);
    }
    else if(w.endsWith("s") && !w.endsWith("ss") && w.length > 3){
        plural.push(w);
    }
    else{
        singular.push(w);
    }

});

// pronouns
let subjectPronouns = ["i","we","you","he","she","it","they"];
let objectPronouns = ["me","us","him","her","them"];

let subjects = words.filter(w => subjectPronouns.includes(w));
let objects = words.filter(w => objectPronouns.includes(w));

// person
let first = ["i","we","me","us","my","our","mine","ours"];
let second = ["you","your","yours"];
let third = ["he","she","it","they","him","her","them","their","his","hers","its","theirs"];

let firstP = words.filter(w=>first.includes(w));
let secondP = words.filter(w=>second.includes(w));
let thirdP = words.filter(w=>third.includes(w));

// possessive
let possessiveAdjectives = ["my","your","his","her","its","our","their"];
let possessivePronouns = ["mine","yours","his","hers","its","ours","theirs"];

let possAdj = words.filter(w => possessiveAdjectives.includes(w));
let possPro = words.filter(w => possessivePronouns.includes(w));

// output
document.getElementById("result").innerHTML =
"<b>Analysis:</b><br><br>" +

"<b>Singular Nouns:</b> " + (singular.length ? singular.join(", ") : "None") + "<br>" +
"<b>Plural Nouns:</b> " + (plural.length ? plural.join(", ") : "None") + "<br>" +
"<b>Verbs:</b> " + (verbs.length ? verbs.join(", ") : "None") + "<br><br>" +

"<b>Subject Pronouns:</b> " + (subjects.length ? subjects.join(", ") : "None") + "<br>" +
"<b>Object Pronouns:</b> " + (objects.length ? objects.join(", ") : "None") + "<br><br>" +

"<b>1st Person:</b> " + (firstP.length ? firstP.join(", ") : "None") + "<br>" +
"<b>2nd Person:</b> " + (secondP.length ? secondP.join(", ") : "None") + "<br>" +
"<b>3rd Person:</b> " + (thirdP.length ? thirdP.join(", ") : "None") + "<br><br>" +

"<b>Possessive Adjectives:</b> " + (possAdj.length ? possAdj.join(", ") : "None") + "<br>" +
"<b>Possessive Pronouns:</b> " + (possPro.length ? possPro.join(", ") : "None");

}

function clearBox(){
document.getElementById("userInput").value="";
document.getElementById("result").innerHTML="";
}

</script>

</body>
</html>
